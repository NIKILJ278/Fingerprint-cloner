<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Cloner - Visual Reconstruction</title>
    <style>
        :root {
            --neon: #2ecc71;
            --bg: #050505;
            --slice-height: 48px; 
            --denied: #e74c3c;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        body::before {
            content: " ";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .interface {
            width: 850px;
            border: 2px solid var(--neon);
            padding: 20px;
            background: rgba(0, 20, 0, 0.1);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
            position: relative;
        }

        #popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            padding: 30px;
            text-align: center;
            background: black;
            border: 3px solid var(--neon);
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        #popup.denied {
            border-color: var(--denied);
            color: var(--denied);
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--neon);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        h3 {
            background: var(--neon);
            color: black;
            padding: 4px 10px;
            margin: 0 0 15px 0;
            font-size: 14px;
        }

        .component-box {
            display: flex;
            flex-direction: column;
            gap: 0px; 
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .reel {
            height: var(--slice-height);
            border-bottom: 1px solid rgba(26, 94, 53, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5px;
        }

        .nav-btn {
            background: transparent;
            color: var(--neon);
            border: 1px solid #1a5e35;
            cursor: pointer;
            padding: 5px 12px;
            font-weight: bold;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--neon);
            color: black;
        }

        .slice-view {
            width: 180px;
            height: 100%;
            background-repeat: no-repeat;
            background-size: 180px 384px; 
        }

        .target-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
        }

        .target-image {
            width: 180px;
            height: 384px;
            background-size: 100% 100%;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #check-btn {
            background: var(--neon);
            color: black;
            border: none;
            padding: 10px 60px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            letter-spacing: 2px;
        }

        #check-btn:hover {
            background: #fff;
        }
    </style>
</head>
<body>

<div class="interface">
    <div id="popup">
        <h1 id="popup-title">SUCCESSFUL</h1>
        <p id="popup-text">ACCESS GRANTED</p>
    </div>

    <div class="header">
        <div>COPIER STATUS: <span id="stage-info">STAGE 1/3</span></div>
        <div id="timer">TIMEOUT: 02:00:00</div>
    </div>

    <div class="game-grid">
        <section>
            <h3>COMPONENTS</h3>
            <div id="reels-container" class="component-box"></div>
        </section>

        <section>
            <h3>CLONE TARGET</h3>
            <div class="target-box">
                <div id="target-img" class="target-image"></div>
            </div>
        </section>
    </div>

    <div class="footer">
        <button id="check-btn" onclick="manualCheck()">CHECK MATCH</button>
    </div>
</div>

<script>
    const fingerprints = [
        'image_1.png', 
        'image_2.png',
        'image_3.jpeg'
    ];

    let currentStage = 0;
    const totalSlices = 8;
    let playerChoices = []; 
    let timerInterval;

    // Original pattern system (UNCHANGED)
    const solutionPatterns = [
        [0, 2, 4, 6, 1, 3, 5, 7],
        [7, 5, 3, 1, 6, 4, 2, 0],
        [1, 3, 5, 7, 0, 2, 4, 6]
    ];

    // 🔥 NEW: shuffled order per bar (only for navigation)
    let sliceOrders = [];

    function makeShuffledOrder(n) {
        const arr = Array.from({ length: n }, (_, i) => i);
        for (let i = n - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initStage(stageIndex) {
        const container = document.getElementById('reels-container');
        const targetImg = document.getElementById('target-img');
        container.innerHTML = '';
        
        targetImg.style.backgroundImage = `url(${fingerprints[stageIndex]})`;
        
        // Original random start (UNCHANGED)
        playerChoices = Array.from({length: totalSlices}, () => Math.floor(Math.random() * 8));

        // 🔥 NEW: shuffle navigation order per bar
        sliceOrders = Array.from({length: totalSlices}, () => makeShuffledOrder(8));

        for (let i = 0; i < totalSlices; i++) {
            const reel = document.createElement('div');
            reel.className = 'reel';
            reel.innerHTML = `
                <button class="nav-btn" onclick="rotateSlice(${i}, -1)">&lt;</button>
                <div class="slice-view" id="slice-${i}"></div>
                <button class="nav-btn" onclick="rotateSlice(${i}, 1)">&gt;</button>
            `;
            container.appendChild(reel);
            updateSliceVisual(i);
        }
    }

    function rotateSlice(index, direction) {
        // 🔥 CHANGED: move inside shuffled order instead of +1/-1
        const order = sliceOrders[index];
        let pos = order.indexOf(playerChoices[index]);
        pos = (pos + direction + order.length) % order.length;
        playerChoices[index] = order[pos];
        updateSliceVisual(index);
    }

    function updateSliceVisual(index) {
        const slice = document.getElementById(`slice-${index}`);
        const currentSolution = solutionPatterns[currentStage];
        
        // Original visual logic (UNCHANGED)
        const visualTargetIndex = index;
        const userChoice = playerChoices[index];
        const requiredChoice = currentSolution[index];
        
        const visualOffsetIndex = (userChoice - requiredChoice + visualTargetIndex + 8) % 8;
        const yOffset = (visualOffsetIndex * 48) * -1;
        
        slice.style.backgroundImage = `url(${fingerprints[currentStage]})`;
        slice.style.backgroundPositionY = `${yOffset}px`;
    }

    function manualCheck() {
        const currentSolution = solutionPatterns[currentStage];
        
        let firstFiveCorrect = true;
        for (let i = 0; i < 5; i++) {
            if (playerChoices[i] !== currentSolution[i]) {
                firstFiveCorrect = false;
                break;
            }
        }
        
        if (firstFiveCorrect) {
            showPopup('success');
        } else {
            showPopup('denied');
        }
    }

    function showPopup(type) {
        const popup = document.getElementById('popup');
        const title = document.getElementById('popup-title');
        const text = document.getElementById('popup-text');

        if (type === 'success') {
            popup.classList.remove('denied');
            title.innerText = "SUCCESSFUL";
            text.innerText = "FRAGMENT ALIGNMENT VALIDATED";
            popup.style.display = "block";
            
            setTimeout(() => {
                popup.style.display = "none";
                if (currentStage < 2) {
                    currentStage++;
                    document.getElementById('stage-info').innerText = `STAGE ${currentStage + 1}/3`;
                    initStage(currentStage);
                } else {
                    clearInterval(timerInterval);
                    title.innerText = "CLONE COMPLETE";
                    text.innerText = "SYSTEM ACCESS GRANTED";
                    popup.style.display = "block";
                    document.getElementById('check-btn').style.display = "none";
                }
            }, 1800);

        } else if (type === 'denied') {
            popup.classList.add('denied');
            title.innerText = "FAILED";
            text.innerText = "PATTERN MISMATCH DETECTED";
            popup.style.display = "block";
            setTimeout(() => { popup.style.display = "none"; }, 1200);
        }
    }

   let seconds = 120; 
timerInterval = setInterval(() => {
    seconds--;
    
    // Check if timer has reached 0
    if (seconds <= 0) {
        clearInterval(timerInterval);
        document.getElementById('timer').innerText = `TIMEOUT: 00:00`;
        
        // Show the failure popup with the specific message
        showPopup('denied'); 
        document.getElementById('popup-title').innerText = "TIMEOUT";
        document.getElementById('popup-text').innerText = "-50 POINTS";
        
        // Optional: Hide the check button so they can't continue
        document.getElementById('check-btn').style.display = "none";
        return;
    }

    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('timer').innerText = `TIMEOUT: 0${m}:${s < 10 ? '0' + s : s}`;
}, 1000);
    initStage(0);
</script>

</body>
</html>
